<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #38bdf8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 55%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 1rem;
    }

    .welcome-card {
      width: min(680px, 100%);
      background: linear-gradient(160deg, #1f2937 0%, var(--card) 100%);
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 2.25rem;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      margin-bottom: 0.75rem;
      letter-spacing: 0.5px;
    }

    p {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
      max-width: 56ch;
      margin: 0 auto 1.5rem;
    }

    .cta {
      display: inline-block;
      text-decoration: none;
      color: #0b1120;
      background: var(--accent);
      padding: 0.7rem 1.1rem;
      border-radius: 10px;
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(56, 189, 248, 0.35);
    }
  </style>
</head>
<body>
  <main class="welcome-card">
    <h1>Welcome!</h1>
    <p>
      Your static HTML page is ready. You can customize this section with your own
      text, links, and branding to match your project.
    </p>
    <a class="cta" href="#">Get Started</a>
  </main>
</body>
</html>
